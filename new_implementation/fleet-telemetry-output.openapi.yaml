      type: object
      description: One line in alerts.jsonl. `data` is an array because a VehicleAlerts message batches
        multiple alerts — the vehicle re-sends recent alert history, so the same alert appears in many
        records.
      required:
      - vin
      - time
      - data
      properties:
        vin:
          type: string
          pattern: ^[A-HJ-NPR-Z0-9]{17}$
        time:
          type: string
          format: date-time
          description: Server-side write timestamp (UTC, RFC3339)
        txid:
          type: string
          description: Transaction ID from the vehicle session
        type:
          type: string
          enum:
          - full
          - snapshot
          - delta
          description: Only present when enable_delta is set in FileWriterConfig. `delta` records contain
            only changed fields; a removed field is encoded as JSON null.
        data:
          type: array
          items:
            $ref: '#/components/schemas/VehicleAlert'
        metadata:
          $ref: '#/components/schemas/RecordMetadata'
        decoded_payload:
          $ref: '#/components/schemas/DecodedPayload'
        payload:
          type: string
          format: byte
          description: 'Legacy: raw FlatBuffers payload (base64). Not written by the current filewriter.'
    VehicleAlert:
      type: object
      description: A single vehicle alert; active while EndedAt is absent.
      required:
      - Name
      properties:
        Name:
          type: string
          description: Alert code identifier
          example: DI_a183_holdReleaseRqrd
        Audiences:
          type: array
          nullable: true
          items:
            type: string
            enum:
            - Unknown
            - Customer
            - Service
            - ServiceFix
        StartedAt:
          type: integer
          format: int64
          description: Unix seconds when the alert started
        EndedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix seconds when the alert ended; absent while active
    ConnectivityRecord:
      type: object
      description: 'One line in connectivity.jsonl: a connect/disconnect event.'
      required:
      - vin
      - time
      - data
      properties:
        vin:
          type: string
          pattern: ^[A-HJ-NPR-Z0-9]{17}$
        time:
          type: string
          format: date-time
          description: Server-side write timestamp (UTC, RFC3339)
        txid:
          type: string
          description: Transaction ID from the vehicle session
        type:
          type: string
          enum:
          - full
          - snapshot
          - delta
          description: Only present when enable_delta is set in FileWriterConfig. `delta` records contain
            only changed fields; a removed field is encoded as JSON null.
        data:
          $ref: '#/components/schemas/ConnectivityData'
        metadata:
          $ref: '#/components/schemas/RecordMetadata'
        decoded_payload:
          $ref: '#/components/schemas/DecodedPayload'
        payload:
          type: string
          format: byte
          description: 'Legacy: raw FlatBuffers payload (base64). Not written by the current filewriter.'
    ConnectivityData:
      type: object
      required:
      - Vin
      - ConnectionID
      - Status
      - CreatedAt
      properties:
        Vin:
          type: string
          pattern: ^[A-HJ-NPR-Z0-9]{17}$
        ConnectionID:
          type: string
          format: uuid
          description: Session id shared by the CONNECTED/DISCONNECTED pair
        Status:
          type: string
          enum:
          - UNKNOWN
          - CONNECTED
          - DISCONNECTED
        NetworkInterface:
          type: string
          description: e.g. wifi, lte; may be empty
        CreatedAt:
          type: integer
          format: int64
          description: Unix seconds when the event occurred
    ErrorRecord:
      type: object
      description: 'One line in errors.jsonl: zero or more diagnostic errors.'
      required:
      - vin
      - time
      - data
      properties:
        vin:
          type: string
          pattern: ^[A-HJ-NPR-Z0-9]{17}$
        time:
          type: string
          format: date-time
          description: Server-side write timestamp (UTC, RFC3339)
        txid:
          type: string
          description: Transaction ID from the vehicle session
        type:
          type: string
          enum:
          - full
          - snapshot
          - delta
          description: Only present when enable_delta is set in FileWriterConfig. `delta` records contain
            only changed fields; a removed field is encoded as JSON null.
        data:
          type: array
          items:
            $ref: '#/components/schemas/VehicleError'
        metadata:
          $ref: '#/components/schemas/RecordMetadata'
        decoded_payload:
          $ref: '#/components/schemas/DecodedPayload'
        payload:
          type: string
          format: byte
          description: 'Legacy: raw FlatBuffers payload (base64). Not written by the current filewriter.'
    VehicleError:
      type: object
      required:
      - Name
      properties:
        Name:
          type: string
          example: unsupported_field
        Body:
          type: string
          description: Human-readable description; may be empty
        Tags:
          type: object
          nullable: true
          additionalProperties:
            type: string
        CreatedAt:
          type: integer
          format: int64
          description: Unix seconds when the error occurred
