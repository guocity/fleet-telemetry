openapi: 3.0.3
info:
  title: Tesla Fleet Telemetry — JSONL File Output Schema
  description: 'GENERATED FILE — regenerate with new_implementation/scripts/generate_openapi.py; do not
    edit by hand.


    Schema of the JSONL records written by the fleet-telemetry FileWriter datastore (datastore/simple/filewriter.go).
    Each line of {base_path}/{VIN}/{YYYY}/{MM}/{txtype}.jsonl conforms to the record schema matching its
    txtype/filename:


    | File | Schema |

    |---|---|

    | V.jsonl | VehicleDataRecord |

    | alerts.jsonl | AlertRecord |

    | connectivity.jsonl | ConnectivityRecord |

    | errors.jsonl | ErrorRecord |

    '
  version: 2.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Fleet Telemetry
    url: https://github.com/teslamotors/fleet-telemetry
paths: {}
components:
  schemas:
    RecordMetadata:
      type: object
      description: Legacy envelope metadata (telemetry.Record.Metadata()). Present in files written by
        older filewriter versions; the current filewriter omits it.
      properties:
        vin:
          type: string
          pattern: ^[A-HJ-NPR-Z0-9]{17}$
        txtype:
          type: string
          enum:
          - V
          - alerts
          - errors
          - connectivity
        txid:
          type: string
        receivedat:
          type: string
          description: Unix ms when the server received the message
        timestamp:
          type: string
          description: Legacy timestamp field
        version:
          type: string
        device_client_version:
          type: string
          description: Vehicle firmware telemetry client version
    DecodedPayload:
      type: object
      description: 'Legacy: raw protobuf serialized via protojson, written only when transmit_decoded_records
        was enabled. The current filewriter omits it.'
      properties:
        created_at:
          type: integer
          format: int64
        device_id:
          type: string
        device_type:
          type: string
        topic:
          type: string
        txid:
          type: string
        data:
          type: object
    VehicleDataRecord:
      type: object
      description: 'One line in V.jsonl: decoded vehicle telemetry signals. `data` maps signal names to
        typed values plus the envelope fields Vin/CreatedAt/IsResend. In delta mode only changed keys
        are present.'
      required:
      - vin
      - time
      - data
      properties:
        vin:
          type: string
          pattern: ^[A-HJ-NPR-Z0-9]{17}$
        time:
          type: string
          format: date-time
          description: Server-side write timestamp (UTC, RFC3339)
        txid:
          type: string
          description: Transaction ID from the vehicle session
        type:
          type: string
          enum:
          - full
          - snapshot
          - delta
          description: Only present when enable_delta is set in FileWriterConfig. `delta` records contain
            only changed fields; a removed field is encoded as JSON null.
        data:
          $ref: '#/components/schemas/VehicleData'
        metadata:
          $ref: '#/components/schemas/RecordMetadata'
        decoded_payload:
          $ref: '#/components/schemas/DecodedPayload'
        payload:
          type: string
          format: byte
          description: 'Legacy: raw FlatBuffers payload (base64). Not written by the current filewriter.'
    VehicleData:
      type: object
      description: Decoded signal map. Keys are Field enum names from vehicle_data.proto (259 signals;
        see x-signal-fields). Vin/CreatedAt/IsResend are envelope fields, required only in full/snapshot
        records — delta records carry just the changed keys, and a signal that left the payload is encoded
        as null.
      properties:
        Vin:
          type: string
          pattern: ^[A-HJ-NPR-Z0-9]{17}$
        CreatedAt:
          type: string
          format: date-time
          description: Vehicle-side capture timestamp
        IsResend:
          type: boolean
          description: Retransmission of previously failed data
      additionalProperties:
        oneOf:
        - $ref: '#/components/schemas/SignalValue'
        - type: 'null'
